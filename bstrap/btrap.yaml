package_manager: default

packages:
  terminal:
    - name: yazi
      profiles: [desktop, server, minimal]
    - name: fastfetch
      profiles: [desktop, server]
    - name: btop
      profiles: [desktop, server]
    - name: eza
      profiles: [desktop, server]
    - name: vim
      profiles: [desktop, server, minimal]
    - name: neovim
      profiles: [desktop, server]
    - name: zoxide
      profiles: [desktop, server, minimal]
    - name: fzf
      profiles: [desktop, server, minimal]

  networking:
    - name: wget
      profiles: [desktop, server]
    - name: curl
      profiles: [desktop, server]
    - name: ufw
      profiles: [desktop, server]

  utilities:
    - name: p7zip
      profiles: [desktop]
    - name: unrar
      profiles: [desktop]
    - name: git
      profiles: [desktop, server, minimal]
    - name: python-yaml
      distro:
        arch: python-yaml
        fedora: python3-pyyaml
        fedora-asahi-remix: python3-pyyaml
        ubuntu: python3-yaml
        debian: python3-yaml
        linuxmint: python3-yaml
        opensuse-leap: python3-PyYAML
        opensuse-tumbleweed: python3-PyYAML
        gentoo: dev-python/pyyaml
        void: python3-PyYAML
      profiles: [desktop, server, minimal]

directories:
  base:
    - path: ~/.bashrc.d
      profiles: [desktop, server, minimal]
    - path: ~/.local/bin
      profiles: [desktop, server, minimal]
    - path: ~/.config
      profiles: [desktop, server, minimal]
    - path: ~/.ssh
      profiles: [desktop, server, minimal]

  xdg_base:
    - path: ~/.local/share
      profiles: [desktop, server]
    - path: ~/.local/state
      profiles: [desktop, server]
    - path: ~/.cache
      profiles: [desktop, server, minimal]

  xdg_user:
    - path: ~/Desktop
      profiles: [desktop]
    - path: ~/Documents
      profiles: [desktop]
    - path: ~/Downloads
      profiles: [desktop]
    - path: ~/Templates
      profiles: [desktop]
    - path: ~/Public
      profiles: [desktop]
    - path: ~/Audio
      profiles: [desktop]
    - path: ~/Pictures
      profiles: [desktop]
    - path: ~/Videos
      profiles: [desktop]

  system:
    - path: ~/.local/share/fonts
      profiles: [desktop]
    - path: ~/.local/share/applications
      profiles: [desktop]
    - path: ~/.local/share/icons
      profiles: [desktop]
    - path: ~/.config/systemd/user
      profiles: [desktop, server, minimal]

permissions:
  - path: ~/.ssh
    mode: "700"
    profiles: [desktop, server, minimal]
  - path: ~/.ssh/authorized_keys
    mode: "600"
    profiles: [desktop, server, minimal]

dotfiles:
  - src: ~/.dotfiles-et-al/bash/.bashrc
    dst: ~/.bashrc
    profiles: [desktop, server, minimal]
  - src: ~/.dotfiles-et-al/bash/.profile
    dst: ~/.profile
    profiles: [desktop, server, minimal]
  - src: ~/.dotfiles-et-al/bash/.bashrc.d/aliases.sh
    dst: ~/.bashrc.d/aliases.sh
    profiles: [desktop, server, minimal]
  - src: ~/.dotfiles-et-al/bash/.bashrc.d/functions.sh
    dst: ~/.bashrc.d/functions.sh
    profiles: [desktop, server, minimal]
  - src: ~/.dotfiles-et-al/vim/.vimrc
    dst: ~/.vimrc
    profiles: [desktop, server, minimal]
    
fonts:
  - name: JetBrainsMono
    profiles: [desktop, server, minimal]
